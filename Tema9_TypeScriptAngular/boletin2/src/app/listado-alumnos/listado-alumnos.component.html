<div class="container">
    <main class="row justify-content-center align-items-center fs-4">
        <table mat-table [dataSource]="alumnos" class="shadow">
            <ng-container matColumnDef="nombre">
                <th mat-header-cell *matHeaderCellDef>Nombre</th>
                <td mat-cell *matCellDef="let alumno">{{alumno.nombre}}</td>
            </ng-container>
            <ng-container matColumnDef="mail">
                <th mat-header-cell *matHeaderCellDef>Mail</th>
                <td mat-cell *matCellDef="let alumno">{{alumno.mail}}</td>
            </ng-container>
            <ng-container matColumnDef="curso">
                <th mat-header-cell *matHeaderCellDef>Curso</th>
                <td mat-cell *matCellDef="let alumno">{{alumno.curso}}</td>
            </ng-container>
            <ng-container matColumnDef="repetidor">
                <th mat-header-cell *matHeaderCellDef>Repetidor</th>
                <td mat-cell *matCellDef="let alumno">{{getRepetidor(alumno)}}</td>
            </ng-container>
            <tr mat-header-row *matHeaderRowDef="['nombre', 'mail', 'curso', 'repetidor']"></tr>
            <tr mat-row *matRowDef="let usuario; columns: ['nombre', 'mail', 'curso', 'repetidor'];"></tr>

    </main>
</div>
