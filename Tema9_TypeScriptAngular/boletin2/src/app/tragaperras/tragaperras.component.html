<section class="flex-column row gap-3 mx-2">
    <h1 class="text-white bg-dark p-3 rounded-4 text-center">Crédito: €{{credito}}</h1>
    <div class="text-center">
        <img class="mx-2 rounded-5" src="img/{{resultado[0]}}.png" alt="{{resultado[0]}}">
        <img class="mx-2 rounded-5" src="img/{{resultado[1]}}.png" alt="{{resultado[1]}}">
        <img class="mx-2 rounded-5" src="img/{{resultado[2]}}.png" alt="{{resultado[2]}}">
    </div>
    <button class="btn btn-primary text-white" (click)="jugar()">¡Jugar!</button>
</section>
